<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация | Лапы, крылья и хвосты</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: ('./fon.jpg');
            padding: 2rem;
        }
        
        .auth-card {
            background: white;
            border-radius: 1rem;
            padding: 2.5rem;
            max-width: 500px;
            width: 100%;
            box-shadow: var(--shadow-lg);
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .auth-header .logo {
            justify-content: center;
            margin-bottom: 1rem;
        }
        
        .auth-header h1 {
            font-size: 1.75rem;
            color: var(--gray-800);
            margin-bottom: 0.5rem;
        }
        
        .auth-header p {
            color: var(--gray-600);
        }
        
        .form-group {
            margin-bottom: 1.25rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--gray-800);
            font-size: 0.875rem;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid var(--gray-200);
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: border-color 0.3s;
            font-family: inherit;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        
        .auth-btn {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 1rem;
        }
        
        .auth-btn:hover {
            background: var(--primary-dark);
        }
        
        .auth-btn:disabled {
            background: var(--gray-200);
            cursor: not-allowed;
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--gray-600);
        }
        
        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        
        .auth-footer a:hover {
            text-decoration: underline;
        }
        
        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="logo">
                    <i class="fa-solid fa-paw"></i>
                    <span>Лапы, крылья и хвосты</span>
                </a>
                <h1>Регистрация</h1>
                <p>Создайте аккаунт для начала работы</p>
            </div>
            
            <div id="errorMessage" class="error-message"></div>
            
            <form id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstname">Имя *</label>
                        <input type="text" id="firstname" required>
                    </div>
                    <div class="form-group">
                        <label for="surname">Фамилия *</label>
                        <input type="text" id="surname" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="lastname">Отчество</label>
                    <input type="text" id="lastname">
                </div>
                
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" required>
                </div>
                
                <div class="form-group">
                    <label for="phone">Телефон *</label>
                    <input type="tel" id="phone" placeholder="+7 (999) 123-45-67" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Пароль *</label>
                    <input type="password" id="password" required minlength="6">
                </div>
                
                <div class="form-group">
                    <label for="passwordConfirm">Подтверждение пароля *</label>
                    <input type="password" id="passwordConfirm" required minlength="6">
                </div>
                
                <div class="form-group">
                    <label for="location">Город</label>
                    <input type="text" id="location">
                </div>
                
                <div class="form-group">
                    <label for="description">О себе</label>
                    <textarea id="description" rows="3"></textarea>
                </div>
                
                <button type="submit" class="auth-btn" id="submitBtn">
                    <i class="fa-solid fa-user-plus"></i> Зарегистрироваться
                </button>
            </form>
            
            <div class="auth-footer">
                Уже есть аккаунт? <a href="login.html">Войти</a>
            </div>
        </div>
    </div>
    
    <script src="js/api.js"></script>
<script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const password = document.getElementById('password').value;
        const passwordConfirm = document.getElementById('passwordConfirm').value;
        
        if (password !== passwordConfirm) {
            showError('Пароли не совпадают');
            return;
        }
        
        if (password.length < 6) {
            showError('Пароль должен содержать минимум 6 символов');
            return;
        }
        
        const userData = {
            firstname: document.getElementById('firstname').value.trim(),
            surname: document.getElementById('surname').value.trim(),
            lastname: document.getElementById('lastname').value.trim(),
            email: document.getElementById('email').value.trim(),
            phone: document.getElementById('phone').value.trim(),
            password: password,
            location: document.getElementById('location').value.trim(),
            description: document.getElementById('description').value.trim()
        };
        
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Регистрация...';
        
        try {
            const result = await API.Auth.register(userData);
            
            if (result.success) {
                // Сохраняем данные профиля сразу после регистрации
                API.storage.setUserData({
                    id: result.userId,
                    FirstName: userData.firstname,
                    Surname: userData.surname,
                    Phone: userData.phone,
                    Description: userData.description,
                    Location: userData.location
                });
                
                window.location.href = 'dashboard.html';
            } else {
                showError(result.error);
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fa-solid fa-user-plus"></i> Зарегистрироваться';
            }
        } catch (error) {
            showError('Ошибка соединения с сервером. Проверьте подключение.');
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fa-solid fa-user-plus"></i> Зарегистрироваться';
        }
    });
    
    function showError(message) {
        const errorMessage = document.getElementById('errorMessage');
        errorMessage.textContent = message;
        errorMessage.classList.add('show');
    }
</script>
</body>
</html>
