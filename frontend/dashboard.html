<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЛапаДом | Личный кабинет</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dashboard-body">
    <div class="dashboard-container">
        <!-- Боковое меню -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fa-solid fa-paw"></i>
                <span>ЛапаДом</span>
            </div>
            
            <div class="role-selector">
                <label>Демо: Ваша роль</label>
                <select id="roleSelector" onchange="switchRole(this.value)">
                    <option value="user">👤 Пользователь</option>
                    <option value="partner">🏢 Партнёр (Приют/Клиника)</option>
                </select>
            </div>

            <nav class="sidebar-nav" id="sidebarNav">
                <!-- Меню генерируется через JS -->
            </nav>

            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="avatar" id="userAvatar">ИИ</div>
                    <div class="user-details">
                        <div class="user-name" id="userName">Иван Иванов</div>
                        <div class="user-role" id="userRole">Пользователь</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Основной контент -->
        <main class="main-content">
            <header class="top-bar">
                <h1 id="pageTitle" class="page-title">Главная</h1>
                <div class="top-actions">
                    <button class="icon-btn">
                        <i class="fa-regular fa-bell"></i>
                        <span class="badge">3</span>
                    </button>
                    <button class="btn btn-primary" onclick="showQuickAction()">
                        <i class="fa-solid fa-plus"></i> Быстрое действие
                    </button>
                </div>
            </header>

            <div class="content" id="mainContent">
                <!-- Контент генерируется через JS -->
            </div>
        </main>
    </div>

    <script src="js/dashboard.js"></script>
</body>
</html>
