<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лапы, крылья и хвосты | Личный кабинет</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dashboard-body">
    <!-- Мобильная шапка -->
    <div class="mobile-header">
        <a href="index.html" class="logo">
            <i class="fa-solid fa-paw"></i>
            <span>Лапы, крылья и хвосты</span>
        </a>
    </div>

    <div class="dashboard-container">
        <!-- Боковое меню (для десктопа) -->
        <aside class="sidebar">
            <a href="index.html" class="sidebar-header">
                <i class="fa-solid fa-paw"></i>
                <span>Лапы, крылья и хвосты</span>
            </a>
            
            <nav class="sidebar-nav" id="sidebarNav">
                <!-- Меню генерируется через JS -->
            </nav>

            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="avatar" id="userAvatar">ИИ</div>
                    <div class="user-details">
                        <div class="user-name" id="userName">Иван Иванов</div>
                        <div class="user-role" id="userRole">Пользователь</div>
                    </div>
                </div>
                <a href="index.html" class="btn btn-outline" style="margin-top: 1rem; width: 100%; text-align: center; text-decoration: none;">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i> Выйти
                </a>
            </div>
        </aside>

        <!-- Основной контент -->
        <main class="main-content">
            <header class="top-bar">
                <h1 id="pageTitle" class="page-title">Главная</h1>
                <div class="top-actions">
                    <button class="icon-btn">
                        <i class="fa-regular fa-bell"></i>
                        <span class="badge">3</span>
                    </button>
                    <button class="btn btn-primary" onclick="showQuickAction()">
                        <i class="fa-solid fa-plus"></i> Разместить
                    </button>
                </div>
            </header>

            <div class="content" id="mainContent">
                <!-- Контент генерируется через JS -->
            </div>
        </main>
    </div>

    <!-- Нижняя навигация (для мобильных) -->
    <nav class="bottom-nav" id="bottomNav">
        <!-- Генерируется через JS -->
    </nav>

    <!-- Модальное окно детальной карточки животного -->
    <div id="animalDetailModal" class="modal-overlay">
        <div class="modal-content" id="animalDetailModalContent">
            <!-- Контент генерируется через JS -->
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
